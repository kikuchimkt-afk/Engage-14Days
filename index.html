<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engage 14Days Challenge</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- ヘッダー -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="logo">Engage 14Days</h1>
                <div class="loop-selector">
                    <span class="loop-badge active" data-loop="1">Loop 1<br><small>基礎</small></span>
                    <span class="loop-badge" data-loop="2">Loop 2<br><small>標準</small></span>
                    <span class="loop-badge" data-loop="3">Loop 3<br><small>応用</small></span>
                </div>
            </div>
            <!-- プログレスバー -->
            <div class="progress-bar-container">
                <div class="progress-bar" id="total-progress" style="width: 0%;"></div>
            </div>
        </header>

        <!-- メインコンテンツ領域（JSで動的切り替え） -->
        <main id="main-content" class="container">
            <!-- ここにマップ画面や問題画面が入る -->
        </main>
    </div>

    <!-- Data and Application Logic -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
